<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Centralizar Div</title>
    <style>
        main {
            background-image: url(imagens/target001.png);
            background-size: 100% 100%;
            background-color: lightgray;
            height: 400px;
            width: 400px;
            position: relative;
        }

        img#imagem {
            position: absolute;
            left: 50%;
            top: 50%;

            transform: translate(-50%, -50%);
        }

    </style>
</head>
<body>
    <main>
        <img src="imagens/pattern001.png" alt="imagem de teste" id="imagem">
    </main>
</body>
</html>
